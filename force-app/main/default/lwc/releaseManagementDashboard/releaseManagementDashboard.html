<template>
    <div class="dashboard-shell slds-card slds-p-around_medium">
        <header class="dashboard-header slds-p-around_large">
            <div class="header-copy">
                <p class="eyebrow">CI-CD Deployment Process </p>
                <h1> Management Dashboard</h1>
            </div>
            <div class="header-badge">
                <lightning-icon icon-name="utility:timeline" size="small"></lightning-icon>
                <span>Live release insights</span>
            </div>
        </header>

        <section class="cards-grid" aria-label="Release management metrics">
            <template for:each={metrics} for:item="metric">
                <article key={metric.title} class="metric-card">
                    <div class={metric.iconClass}>
                        <lightning-icon icon-name={metric.iconName} size="medium"></lightning-icon>
                    </div>
                    <div class="card-body">
                        <h2>{metric.title}</h2>
                        <p class="metric-value">{metric.value}</p>
                        <p class="metric-subtitle">{metric.subtitle}</p>
                    </div>
                </article>
            </template>
        </section>

        <section class="detail-grid" aria-label="Release execution details">
            <template for:each={detailCards} for:item="detail">
                <article key={detail.title} class="detail-card">
                    <div class="detail-card-header">
                        <div class={detail.iconClass}>
                            <lightning-icon icon-name={detail.iconName} size="small"></lightning-icon>
                        </div>
                        <div class="detail-heading">
                            <h2>{detail.title}</h2>
                            <span class={detail.statusClass}>{detail.status}</span>
                        </div>
                    </div>

                    <ul class="detail-list">
                        <template for:each={detail.fields} for:item="field">
                            <li key={field.label} class="detail-item">
                                <span class="detail-label">{field.label}</span>
                                <span class="detail-value">{field.value}</span>
                            </li>
                        </template>
                    </ul>
                </article>
            </template>
        </section>
    </div>
</template>
